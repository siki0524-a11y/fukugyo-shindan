<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>副業診断 | あなたに合う副業タイプを無料診断</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c8ff00;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #888;
    --muted2: #555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 0 0 48px;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ========== LANDING ========== */
  .landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    text-align: center;
  }

  .landing-badge {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    border: 1px solid rgba(200,255,0,0.3);
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 28px;
  }

  .landing h1 {
    font-size: 28px;
    font-weight: 900;
    line-height: 1.4;
    margin-bottom: 16px;
    letter-spacing: -0.3px;
  }

  .landing-sub {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.8;
    max-width: 320px;
    margin: 0 auto 36px;
  }

  .start-btn {
    display: block;
    width: 100%;
    max-width: 320px;
    margin: 0 auto 12px;
    padding: 18px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: #000;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .start-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .start-btn:active { transform: translateY(0); }

  .landing-note {
    font-size: 12px;
    color: var(--muted2);
  }

  .landing-features {
    display: flex;
    gap: 20px;
    margin-top: 48px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .feature-item {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .feature-item::before {
    content: '✓';
    color: var(--accent);
    font-weight: 700;
  }

  /* ========== QUIZ ========== */
  .quiz-wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  .progress-wrap { margin-bottom: 32px; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
  .progress-label { font-size: 12px; color: var(--muted); margin-top: 8px; text-align: right; }

  .q-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px 24px; animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-num { font-size: 11px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
  .q-text { font-size: 19px; font-weight: 700; line-height: 1.5; margin-bottom: 24px; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: transparent; border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; color: var(--text); font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px; cursor: pointer; text-align: left;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
  }
  .option:hover { border-color: var(--accent); background: rgba(200,255,0,0.05); transform: translateX(4px); }

  /* ========== RESULT ========== */
  .result-wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 32px 20px;
    animation: fadeUp 0.4s ease;
  }

  .result-label { font-size: 11px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }

  .result-title {
    font-size: 20px; font-weight: 900; line-height: 1.5; margin-bottom: 24px;
  }
  .result-title em { color: var(--accent); font-style: normal; }

  .section {
    margin-bottom: 24px;
  }
  .section-head {
    font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase;
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .reason-box {
    background: rgba(200,255,0,0.05); border-left: 2px solid var(--accent);
    padding: 14px 16px; border-radius: 0 10px 10px 0;
    font-size: 14px; line-height: 1.9; color: #ddd;
  }

  .step-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px;
    font-size: 14px; line-height: 1.9; color: #ddd;
  }

  .cta-bridge {
    font-size: 13px; color: var(--muted); margin-bottom: 12px; text-align: center;
  }

  .service-cards { display: flex; flex-direction: column; gap: 12px; }

  .service-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    transition: border-color 0.15s;
  }
  .service-card:hover { border-color: var(--accent); }

  .service-card-body { padding: 16px 18px; }
  .service-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .service-for { font-size: 11px; color: var(--accent); margin-bottom: 6px; }
  .service-desc { font-size: 13px; color: var(--muted); line-height: 1.7; }

  .service-cta {
    display: block; width: calc(100% - 32px); margin: 0 16px 16px;
    padding: 13px; background: transparent; border: 1px solid var(--accent);
    border-radius: 8px; color: var(--accent); font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; font-weight: 700; text-align: center; text-decoration: none;
    transition: background 0.15s;
  }
  .service-cta:hover { background: rgba(200,255,0,0.1); }

  .tip-box {
    background: var(--surface2); border-radius: 10px; padding: 14px 16px;
    font-size: 13px; color: var(--muted); line-height: 1.8;
  }

  .bottom-cta {
    background: rgba(200,255,0,0.05); border: 1px solid rgba(200,255,0,0.2);
    border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 24px;
  }
  .bottom-cta-text { font-size: 13px; color: #ccc; line-height: 1.7; margin-bottom: 14px; }

  .retry-btn {
    width: 100%; padding: 14px; background: transparent;
    border: 1px solid var(--border); border-radius: 10px; color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .retry-btn:hover { border-color: var(--accent); color: var(--accent); }

  .loading-wrap { padding: 60px 0; text-align: center; }
  .loading-dots { display: inline-flex; gap: 6px; }
  .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }
  .loading-text { font-size: 13px; color: var(--muted); margin-top: 16px; }

  .error-msg { color: var(--accent2); font-size: 13px; text-align: center; padding: 24px 0; }
</style>
</head>
<body>

<!-- ========== LANDING ========== -->
<div id="screenLanding" class="screen active">

      </div>

      </div>

      <div class="bottom-cta">

      </div>

      <button class="retry-btn" onclick="reset()">もう一度診断する</button>
    </div>
    <div id="errorMsg" class="error-msg" style="display:none">
      エラーが発生しました。<br><br>
      <button class="retry-btn" onclick="reset()">もう一度試す</button>
    </div>
  </div>
</div>

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startQuiz() {
  current = 0;
  answers = [];
  show('screenQuiz');
  renderQ();
}

function renderQ() {
  const q = questions[current];
  document.getElementById('qNum').textContent = `Q${current + 1}`;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progressFill').style.width = (current / questions.length * 100) + '%';
  document.getElementById('progressLabel').textContent = `${current} / ${questions.length}`;

  const container = document.getElementById('options');
  container.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => choose(opt);
    container.appendChild(btn);
  });

  const card = document.getElementById('qCard');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = '';
}

function choose(answer) {
  answers.push(answer);
  current++;
  if (current < questions.length) {
    renderQ();
  } else {
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('progressLabel').textContent = '5 / 5';
    show('screenResult');
    callClaude();
  }
}

async function callClaude() {
  document.getElementById('loadingWrap').style.display = 'block';
  document.getElementById('resultContent').style.display = 'none';
  document.getElementById('errorMsg').style.display = 'none';

  const qa = questions.map((q, i) => `Q: ${q.text} → A: ${answers[i]}`).join('\n');
  const prompt = `以下のユーザーの回答をもとに、最も合う副業を1つだけ選んでください。

${qa}

選択肢（必ずこの中から1つだけ答えること）:
ポイ活、アンケートモニター、スキマバイト、Webライター、動画編集、AI副業、転売

回答は選択肢の文字列のみ。説明不要。`;

  try {
    const res = await fetch("https://fukugyo-api.siki0524.workers.dev/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 50,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await res.json();
    const text = (data.content?.[0]?.text || '').trim();
    const key = Object.keys(RESULTS).find(k => text.includes(k)) || 'ポイ活';
    renderResult(RESULTS[key]);

  } catch (e) {
    document.getElementById('loadingWrap').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'block';
  }
}

function renderResult(r) {
  document.getElementById('loadingWrap').style.display = 'none';
  document.getElementById('resultContent').style.display = 'block';

  document.getElementById('resultTitle').innerHTML = r.title.replace(/「(.+?)」/, '「<em>$1</em>」');
  document.getElementById('resultReason').textContent = r.reason;
  document.getElementById('resultStep').textContent = r.step;
  document.getElementById('resultBridge').textContent = r.bridge;
  document.getElementById('resultTip').textContent = r.tip;
  document.getElementById('resultBottomCta').textContent = r.bottomCta;

  const servicesEl = document.getElementById('resultServices');
  servicesEl.innerHTML = '';
  r.services.forEach(s => {
    const card = document.createElement('div');
    card.className = 'service-card';
    card.innerHTML = `
      <div class="service-card-body">
        <div class="service-name">${s.name}</div>
        <div class="service-for">${s.forWho}</div>
        <div class="service-desc">${s.desc}</div>
      </div>
      <a href="${s.url}" target="_blank" rel="noopener noreferrer" class="service-cta">${s.cta} →</a>
    `;
    servicesEl.appendChild(card);
  });
}

function reset() {
  show('screenLanding');
}
</script>
